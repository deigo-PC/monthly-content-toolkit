<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BRAND_NAME}} — Carousel Image Prompts — {{MONTH_YEAR}}</title>
<style>
  :root {
    --bg: #000000;
    --surface: #2a2a2a;
    --surface-2: #222222;
    --text: #ffffff;
    --text-muted: #9ca3af;
    --text-soft: #cccccc;
    --border: #3a3a3a;
    --accent: #3b82f6;
    --accent-soft: #1e3a5f;
    --success: #22c55e;
    --warning: #f59e0b;
    --role-hook: #f59e0b;
    --role-info: #3b82f6;
    --role-conversion: #22c55e;
    --role-cta: #ef4444;
    --radius: .75rem;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --code-font: "SF Mono", "Consolas", "Menlo", monospace;
    --sidebar-w: 240px;
  }

  [data-theme="light"] {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface-2: #f1efe9;
    --text: #1a1a1a;
    --text-muted: #5a5a5a;
    --text-soft: #333333;
    --border: #e3e1dc;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --success: #16a34a;
    --warning: #d97706;
    --role-hook: #d97706;
    --role-info: #2563eb;
    --role-conversion: #16a34a;
    --role-cta: #dc2626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.6;
    transition: background .2s, color .2s;
  }

  /* ── LAYOUT ── */
  .app-layout {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 50;
    transition: transform .25s ease;
  }

  .sidebar-inner {
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .sidebar-brand {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    padding: 0 12px;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 4px 12px;
  }

  .sidebar-link {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    border-radius: 6px;
    transition: background .12s, color .12s;
  }

  .sidebar-link:hover {
    background: var(--surface-2);
    color: var(--text);
  }

  .sidebar-link.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }

  .sidebar-close { display: none; }

  .sidebar-overlay { display: none; }

  /* ── MAIN CONTENT ── */
  .main-content { min-width: 0; }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* ── HEADER ── */
  .header {
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .hamburger { display: none; }

  .header-top h1 {
    font-size: 28px;
    font-weight: 700;
    margin: 0;
    flex: 1;
  }

  .theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    cursor: pointer;
    font-size: 18px;
    padding: 8px 12px;
    line-height: 1;
    transition: background .15s;
    flex-shrink: 0;
  }

  .theme-toggle:hover { background: var(--surface-2); }

  .header-sub {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .header-count {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ── CAROUSEL SECTIONS ── */
  .carousel-section {
    margin-bottom: 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    transition: border-color .15s;
  }

  .carousel-section:hover { border-color: #555; }

  .carousel-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background .1s;
  }

  .carousel-header:hover { background: var(--surface-2); }

  .carousel-header h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
  }

  .carousel-meta {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
    flex: 1;
  }

  .carousel-toggle-icon {
    font-size: 14px;
    color: var(--text-muted);
    transition: transform .15s;
    flex-shrink: 0;
  }

  .carousel-section.collapsed .carousel-toggle-icon {
    transform: rotate(-90deg);
  }

  .carousel-section.collapsed .slides-wrap { display: none; }

  .slides-wrap {
    border-top: 1px solid var(--border);
    display: grid;
    gap: 0;
  }

  /* ── SLIDE CARDS ── */
  .slide-card {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .slide-card:last-child { border-bottom: none; }

  .slide-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--surface-2);
  }

  .slide-number {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .role-tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .role-tag[data-role="hook"] { background: var(--role-hook); color: #000; }
  .role-tag[data-role="info"] { background: var(--role-info); color: #fff; }
  .role-tag[data-role="conversion"] { background: var(--role-conversion); color: #000; }
  .role-tag[data-role="cta"] { background: var(--role-cta); color: #fff; }

  .slide-meta {
    font-size: 11px;
    color: var(--text-muted);
    flex: 1;
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    padding: 5px 10px;
    transition: background .1s, color .1s;
    flex-shrink: 0;
  }

  .copy-btn:hover {
    background: var(--border);
    color: var(--text);
  }

  .copy-btn.copied {
    border-color: var(--success);
    color: var(--success);
  }

  .prompt-box {
    position: relative;
  }

  .prompt-box pre {
    margin: 0;
    padding: 16px 20px;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: var(--code-font);
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-soft);
    overflow-x: auto;
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 64px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 800px) {
    .app-layout { grid-template-columns: 1fr; }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      transform: translateX(-100%);
      width: 280px;
      z-index: 50;
      border-right: 1px solid var(--border);
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-close {
      display: block;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 49;
    }

    .sidebar-overlay.open { display: block; }

    .hamburger {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
      padding: 8px 10px;
      line-height: 1;
      flex-shrink: 0;
    }

    .hamburger:hover { background: var(--surface-2); }

    .sidebar-brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
  }

  @media (max-width: 640px) {
    .container { padding: 20px 12px 48px; }
    .header-top h1 { font-size: 22px; }
    .carousel-header { padding: 12px 14px; }
    .slide-card-header { padding: 10px 14px; }
    .prompt-box pre { padding: 12px 14px; font-size: 12px; }
  }

  @media print {
    body { background: #ffffff; color: #000000; }
    .sidebar, .hamburger, .theme-toggle, .copy-btn,
    .carousel-toggle-icon { display: none !important; }
    .app-layout { display: block; }
    .container { max-width: 100%; padding: 0; }
    .carousel-section { break-inside: avoid; }
    .slide-card { break-inside: avoid; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
    html { scroll-behavior: auto; }
  }
</style>
</head>
<body>

<div class="app-layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-brand">
        <span>{{BRAND_NAME}}</span>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close navigation">✕</button>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <span class="sidebar-label">Carousels</span>
        <div id="sidebarLinks">
          {{SIDEBAR_LINKS}}
        </div>
      </nav>
    </div>
  </aside>

  <!-- ── SIDEBAR OVERLAY ── -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ── MAIN CONTENT ── -->
  <main class="main-content">
    <div class="container">

      <!-- ── HEADER ── -->
      <header class="header">
        <div class="header-top">
          <button class="hamburger" id="sidebarToggle" aria-label="Open navigation">☰</button>
          <h1>{{BRAND_NAME}} — Carousel Image Prompts</h1>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
        </div>
        <p class="header-sub">{{MONTH_YEAR}} · {{LANGUAGE}}</p>
        <p class="header-count">Generated from Content Plan + Brand Guide</p>
      </header>

      <!-- ── CAROUSEL SECTIONS ── -->
      {{CAROUSEL_SECTIONS}}

      <!-- ── FOOTER ── -->
      <footer class="footer">
        <p>Generated by Carousel Prompt Generator v2 · {{GENERATED_DATE}}</p>
      </footer>

    </div>
  </main>

</div>

<script>
(function() {

  // ── THEME ──
  var STORAGE_KEY = 'carousel-prompt-theme';

  function getPreferredTheme() {
    var stored = localStorage.getItem(STORAGE_KEY);
    if (stored === 'light' || stored === 'dark') return stored;
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
    return 'dark';
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = theme === 'dark' ? '🌙' : '☀️';
  }

  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') || 'dark';
    var next = current === 'dark' ? 'light' : 'dark';
    setTheme(next);
    localStorage.setItem(STORAGE_KEY, next);
  }

  setTheme(getPreferredTheme());

  var themeBtn = document.getElementById('themeToggle');
  if (themeBtn) themeBtn.addEventListener('click', toggleTheme);

  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e) {
    if (!localStorage.getItem(STORAGE_KEY)) {
      setTheme(e.matches ? 'light' : 'dark');
    }
  });

  // ── SIDEBAR TOGGLE (mobile) ──
  var sidebar = document.getElementById('sidebar');
  var sidebarToggle = document.getElementById('sidebarToggle');
  var sidebarClose = document.getElementById('sidebarClose');
  var sidebarOverlay = document.getElementById('sidebarOverlay');

  function openSidebar() {
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  if (sidebarToggle) sidebarToggle.addEventListener('click', openSidebar);
  if (sidebarClose) sidebarClose.addEventListener('click', closeSidebar);
  if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);

  // ── SIDEBAR SCROLL-SPY ──
  var sidebarLinks = document.querySelectorAll('.sidebar-link');

  function updateActiveLink() {
    var currentId = '';
    var sections = document.querySelectorAll('.carousel-section');
    var scrollPos = window.scrollY + 100;

    sections.forEach(function(section) {
      if (section.offsetTop <= scrollPos) {
        currentId = section.id;
      }
    });

    sidebarLinks.forEach(function(link) {
      link.classList.remove('active');
      if (link.getAttribute('href') === '#' + currentId) {
        link.classList.add('active');
      }
    });
  }

  window.addEventListener('scroll', updateActiveLink, { passive: true });
  window.addEventListener('load', updateActiveLink);

  // ── CAROUSEL COLLAPSE/EXPAND ──
  document.querySelectorAll('.carousel-header').forEach(function(header) {
    header.addEventListener('click', function(e) {
      var section = this.closest('.carousel-section');
      if (section) {
        section.classList.toggle('collapsed');
      }
    });
  });

  // ── COPY-TO-CLIPBOARD ──
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.copy-btn');
    if (!btn) return;

    var card = btn.closest('.slide-card');
    if (!card) return;

    var pre = card.querySelector('pre');
    if (!pre) return;

    var text = pre.textContent.trim();

    navigator.clipboard.writeText(text).then(function() {
      btn.classList.add('copied');
      var origText = btn.innerHTML;
      btn.innerHTML = '✓ Copied';
      setTimeout(function() {
        btn.classList.remove('copied');
        btn.innerHTML = origText;
      }, 1500);
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.innerHTML = '✓ Copied';
      setTimeout(function() { btn.innerHTML = '📋'; }, 1500);
    });
  });

})();
</script>

</body>
</html>
